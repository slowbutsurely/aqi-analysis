{% extends 'base.html' %}
{% block content %}

    <div class="profile-container">
        <div class="profile-header">
            <h2>个人信息管理</h2>
        </div>
        <form method="post" enctype="multipart/form-data" class="profile-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" class="form-control" value="{{ user.username }}" readonly>
            </div>

            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name = "email" class="form-control" value="{{ user.email }}">
            </div>

            <div class="form-group">
                <label for="first_name">姓氏</label>
                <input type="text" id="first_name" name="first_name" class="form-control" value="{{ user.first_name }}">
            </div>

            <div class="form-group">
                <label for="last_name">名字</label>
                <input type="text" id="last_name" name="last_name" class="form-control" value="{{ user.last_name }}">
            </div>

            <div class="avatar-section">
                <div>
                    {% if user.avatar %}
                        <img src="{{ MEDIA_URL }}{{ user.avatar }}" alt="头像" class="avatar-preview" id="avatarPreview">
                    {% else %}
                        <img src="/media/avatars/default.jpg" alt="头像" class="avatar-preview" id="avatarPreview">
                    {% endif %}
                </div>

                <label for="avatar" class="avatar-upload-btn">选择头像</label>
                <input type="file" id="avatar" name="avatar" accept="image/*" style="display: none"
                       onchange="previewImage(this)">

                <p>支持JPG、PNG格式，建议尺寸 200x200 像素</p>
            </div>
            <button type="submit" class="btn-submit">保存更改</button>

        </form>
    </div>
    <script>
    function previewImage(input) {
        const preview = document.getElementById('avatarPreview');
        const file = input.files[0];
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
        }

        if (file) {
            reader.readAsDataURL(file);
        }
    }
    </script>

{% endblock %}
