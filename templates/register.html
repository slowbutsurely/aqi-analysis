<!DOCTYPE html>

<html lang="en">

<head>
    {% load static %}
    <title>注册</title>
    <!-- Meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="keywords" content="Gadget Sign Up Form Responsive Widget, Audio and Video players, Login Form Web Template, Flat Pricing Tables, Flat Drop-Downs, Sign-Up Web Templates, Flat Web Templates, Login Sign-up Responsive Web Template, Smartphone Compatible Web Template, Free Web Designs for Nokia, Samsung, LG, Sony Ericsson, Motorola Web Design"
    />
    <script>
        addEventListener("load", function () { setTimeout(hideURLbar, 0); }, false); function hideURLbar() { window.scrollTo(0, 1); }
    </script>
    <!-- Meta tags -->
    <!-- font-awesome icons -->
    <link href="{% static 'login/css/font-awesome.min.css' %}" rel="stylesheet">
    <!-- //font-awesome icons -->
    <!--stylesheets-->
    <link href="{% static 'login/css/style.css' %}" rel="stylesheet" type="text/css" media="all">
    <!--//style sheet end here-->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,500,600" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700" rel="stylesheet">
</head>
<body>
    <h1 class="error">空气质量分析及预测-注册</h1>
	<!---728x90--->
    <div class="w3layouts-two-grids">
	<!---728x90--->
        <div class="mid-class">
            <div class="img-right-side">
                <h3>管理您的注册账号</h3>
                <img src="{% static 'login/images/b11.png'%}" class="img-fluid" alt="">
            </div>
            <div class="txt-left-side">
                <h2>在这里注册</h2>
                <form id="registerForm">
                    {% csrf_token %}
                    <div class="form-left-to-w3l">
                        <span class="fa fa-user-o" aria-hidden="true"></span>
                        <input type="text" name="username" placeholder="用户名（6-10位数字或字母）" required="">

                        <div class="clear"></div>
                    </div>
                    <div class="form-left-to-w3l">
                        <span class="fa fa-phone" aria-hidden="true"></span>
                        <input type="email" name="email" placeholder="邮箱" required="">

                        <div class="clear"></div>
                    </div>
                    <div class="form-left-to-w3l ">

                        <span class="fa fa-lock" aria-hidden="true"></span>
                        <input type="password" name="password" placeholder="密码（8-12位数字或字母）" required="">
                        <div class="clear"></div>
                    </div>
                    <div class="form-left-to-w3l ">

                        <span class="fa fa-lock" aria-hidden="true"></span>
                        <input type="password" name="confirm_password" placeholder="确认密码" required="">
                        <div class="clear"></div>
                    </div>
                    <div class="btnn">
                        <button type="submit"style="height:45px;">注册</button>
                    </div>
                </form>
                <div class="w3layouts_more-buttn">
                    <h3>已有账号?
                        <a href="{% url 'home:login'%}">去登录
                        </a>
                    </h3>
                </div>
                <div class="clear"></div>
            </div>
        </div>
    </div>
	<!---728x90--->
    <footer class="copyrigh-wthree">
        <p>
             <a target="_blank" href="#" title=""></a>
        </p>
    </footer>
<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

<script>
    $(document).ready(function(){
      $('#registerForm').on('submit',function(e){
           e.preventDefault();

           // 前端格式校验
           var username = $('input[name="username"]').val().trim();
           var password = $('input[name="password"]').val();
           var confirmPassword = $('input[name="confirm_password"]').val();

           // 账号校验：6-10位数字或字母
           var userReg = /^[a-zA-Z0-9]{6,10}$/;
           if (!userReg.test(username)) {
               alert('账号必须是6-10位数字或字母');
               return;
           }

           // 密码校验：8-12位数字或字母
           var pwdReg = /^[a-zA-Z0-9]{8,12}$/;
           if (!pwdReg.test(password)) {
               alert('密码必须是8-12位数字或字母');
               return;
           }

           // 确认密码校验
           if (password !== confirmPassword) {
               alert('两次密码输入不一致');
               return;
           }

           $.ajax({
              url: "{% url 'home:register' %}",
              type:"POST",
              data: $(this).serialize(),
              headers:{"X-CSRFToken":$("input[name='csrfmiddlewaretoken']").val()},
              success:function(res){
                if(res.status==='200'){
                 alert(res.msg)
                 window.location.href = '/home/login/'
                }else{
                  alert(res.msg)
                  }
              },
              error:function(){
                    alert('服务器错误')
              }
           })
       })
     })
</script>


</body>

</html>
