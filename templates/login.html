<!DOCTYPE html>

<html lang="en">

<head>
    {% load static %}
    <title>登录</title>
    <!-- Meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="keywords" content="Gadget Sign Up Form Responsive Widget, Audio and Video players, Login Form Web Template, Flat Pricing Tables, Flat Drop-Downs, Sign-Up Web Templates, Flat Web Templates, Login Sign-up Responsive Web Template, Smartphone Compatible Web Template, Free Web Designs for Nokia, Samsung, LG, Sony Ericsson, Motorola Web Design"
    />
    <script>
        addEventListener("load", function () { setTimeout(hideURLbar, 0); }, false); function hideURLbar() { window.scrollTo(0, 1); }
    </script>
    <!-- Meta tags -->
    <!-- font-awesome icons -->
    <link href="{% static 'login/css/font-awesome.min.css' %}" rel="stylesheet">
    <!-- //font-awesome icons -->
    <!--stylesheets-->
    <link href="{% static 'login/css/style.css' %}" rel="stylesheet" type="text/css" media="all">
    <!--//style sheet end here-->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,500,600" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700" rel="stylesheet">
</head>
<body>
    <h1 class="error">空气质量分析及预测-登录</h1>
	<!---728x90--->
    <div class="w3layouts-two-grids">
	<!---728x90--->
        <div class="mid-class">
            <div class="img-right-side">
                <h3>欢迎回来</h3>
                <img src="{% static 'login/images/b11.png'%}" class="img-fluid" alt="">
            </div>
            <div class="txt-left-side">
                <h2>欢迎登录</h2>
                <form id="loginForm">
                    {% csrf_token %}
                    <div class="form-left-to-w3l">
                        <span class="fa fa-user-o" aria-hidden="true"></span>
                        <input type="text" name="username" placeholder=" 用户名" required="">

                        <div class="clear"></div>
                    </div>
                    <div class="form-left-to-w3l">
                        <span class="fa fa-lock" aria-hidden="true"></span>
                        <input type="password" name="password" placeholder="密码" required="">

                        <div class="clear"></div>
                    </div>
                    <div class="btnn">
                        <button type="submit" style="height:45px;">登录</button>
                    </div>
                </form>
                <div class="w3layouts_more-buttn">
                    <h3>还没有账号?
                        <a href="{% url 'home:register'%}">去注册
                        </a>
                    </h3>
                </div>
                <div class="clear"></div>
            </div>
        </div>
    </div>
	<!---728x90--->
    <footer class="copyrigh-wthree">
        <p>
              <a target="_blank" href="#" title=""></a>
        </p>
    </footer>
<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
<script>
    $(document).ready(function(){
      $('#loginForm').on('submit',function(e){
           e.preventDefault();
           $('button[type="submit"]').text('登录中...').prop('disabled',true)
           $.ajax({
              url: "{% url 'home:login' %}",
              type:"POST",
              data: $(this).serialize(),
              headers:{"X-CSRFToken":$("input[name='csrfmiddlewaretoken']").val()},
              success:function(res){
                if(res.status==='200'){
                 window.location.href = '/home/index/'
                }else{
                  alert(res.msg)
                  $('button[type="submit"]').text('登录').prop('disabled', false)
                  }
              },
              error:function(){
                    alert('服务器错误')
                    $('button[type="submit"]').text('登录').prop('disabled', false)
              }
           })
       })
     })
</script>

</body>

</html>
